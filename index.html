<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚡ ULTRA DOWNLOADER</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #11111a;
    --card:     #16161f;
    --border:   #ffffff0f;
    --accent:   #e8ff00;
    --accent2:  #00f5c4;
    --danger:   #ff4466;
    --text:     #e8e8f0;
    --muted:    #5a5a72;
    --radius:   14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background noise & glow ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80vw 60vh at 50% -10%, #e8ff0012 0%, transparent 70%),
      radial-gradient(ellipse 50vw 40vh at 100% 80%, #00f5c408 0%, transparent 60%);
    pointer-events: none;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .page { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 3rem 2rem 2rem;
    text-align: center;
    animation: fadeDown .6s ease both;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: .5rem;
    background: var(--accent);
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem; font-weight: 700;
    letter-spacing: .15em;
    padding: .3rem .8rem;
    border-radius: 2rem;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 12vw, 9rem);
    line-height: .9;
    letter-spacing: .02em;
    background: linear-gradient(170deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    margin-top: .8rem;
    color: var(--muted);
    font-size: .95rem;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  /* ── MAIN CARD ── */
  .main-card {
    max-width: 720px;
    margin: 2rem auto 4rem;
    padding: 0 1rem;
    animation: fadeUp .7s ease .1s both;
  }

  .glass {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
  }

  /* ── URL INPUT SECTION ── */
  .input-section { padding: 1.8rem; }

  .input-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--accent);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: .7rem;
    display: block;
  }

  .url-row {
    display: flex; gap: .6rem;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .9rem 1.1rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .85rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .url-input::placeholder { color: var(--muted); }
  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #e8ff0018;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
    padding: .9rem 1.4rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: .9rem;
    transition: transform .15s, opacity .15s, box-shadow .2s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 0 24px #e8ff0055;
    opacity: .9;
  }

  .btn-accent2 {
    background: var(--accent2);
    color: #000;
    font-weight: 700;
  }
  .btn-accent2:hover:not(:disabled) {
    box-shadow: 0 0 24px #00f5c455;
    opacity: .9;
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 1.8rem;
  }

  /* ── INFO SECTION ── */
  .info-section {
    padding: 1.8rem;
    display: none;
    animation: fadeUp .4s ease both;
  }
  .info-section.visible { display: block; }

  .media-card {
    display: flex; gap: 1.2rem; align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .thumb-wrap {
    position: relative; flex-shrink: 0;
    width: 130px; height: 82px;
    border-radius: 8px; overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .thumb-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    color: var(--muted);
  }
  .platform-badge {
    position: absolute; bottom: 5px; right: 5px;
    background: #000000cc;
    font-family: 'JetBrains Mono', monospace;
    font-size: .55rem; font-weight: 700;
    letter-spacing: .1em;
    color: var(--accent);
    padding: .15rem .4rem;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .media-meta { flex: 1; min-width: 0; }
  .media-title {
    font-size: 1rem; font-weight: 500;
    line-height: 1.3;
    margin-bottom: .4rem;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: .5rem;
    margin-top: .5rem;
  }
  .meta-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .25rem .6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
  }
  .meta-pill span { color: var(--text); }

  /* ── MODE TOGGLE ── */
  .mode-toggle {
    display: flex; gap: .5rem;
    margin-bottom: 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .3rem;
  }
  .mode-btn {
    flex: 1; padding: .55rem;
    border-radius: 7px; border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .88rem; font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: .4rem;
  }
  .mode-btn.active {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px #0006;
  }

  /* ── FORMAT PICKER ── */
  .format-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: .6rem;
  }
  #formatGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: .4rem; margin-bottom: 1.2rem;
    max-height: 160px; overflow-y: auto;
    padding-right: 2px;
  }
  #formatGrid::-webkit-scrollbar { width: 4px; }
  #formatGrid::-webkit-scrollbar-track { background: transparent; }
  #formatGrid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .format-chip {
    padding: .45rem .5rem;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: .72rem; font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
    line-height: 1.3;
  }
  .format-chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .format-chip.selected {
    border-color: var(--accent2);
    background: #00f5c415;
    color: var(--accent2);
  }
  .format-chip .chip-ext {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: .6rem; color: var(--muted);
    margin-top: 2px;
  }

  /* ── DOWNLOAD BUTTON ROW ── */
  .dl-row {
    display: flex; gap: .6rem;
  }
  #dlBtn { flex: 1; padding: 1rem; font-size: 1rem; letter-spacing: .03em; }

  /* ── PROGRESS SECTION ── */
  .progress-section {
    padding: 1.8rem;
    display: none;
    animation: fadeUp .4s ease both;
  }
  .progress-section.visible { display: block; }

  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem;
  }
  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem; color: var(--muted);
    letter-spacing: .1em; text-transform: uppercase;
  }
  .progress-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; color: var(--accent);
    line-height: 1;
  }

  .bar-track {
    height: 6px;
    background: var(--surface);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: .8rem;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    width: 0%;
    transition: width .4s cubic-bezier(.25,.8,.25,1);
    position: relative;
  }
  .bar-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, transparent, #ffffff44);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  .progress-file {
    font-size: .82rem; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── DONE SECTION ── */
  .done-section {
    padding: 2rem 1.8rem;
    text-align: center;
    display: none;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .done-section.visible { display: block; }

  .done-icon {
    font-size: 3.5rem;
    margin-bottom: .8rem;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .done-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem; color: var(--accent);
    letter-spacing: .05em;
    margin-bottom: .3rem;
  }
  .done-meta {
    color: var(--muted); font-size: .82rem;
    margin-bottom: 1.5rem;
  }
  .done-row { display: flex; gap: .6rem; justify-content: center; }

  /* ── ERROR ── */
  .error-bar {
    margin: 0 1.8rem 1.5rem;
    padding: .8rem 1rem;
    background: #ff446615;
    border: 1px solid #ff446640;
    border-radius: 8px;
    color: var(--danger);
    font-size: .85rem;
    display: none;
    animation: fadeUp .3s ease both;
  }
  .error-bar.visible { display: flex; gap: .5rem; align-items: flex-start; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .08em;
    animation: fadeUp .8s ease .3s both;
  }
  footer span { color: var(--accent); }

  /* ── SPINNER ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #0004;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
    vertical-align: middle;
  }

  /* ── STATUS DOT ── */
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.4s ease infinite;
    margin-right: .3rem;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .media-card { flex-direction: column; }
    .thumb-wrap { width: 100%; height: 140px; }
    .url-row { flex-direction: column; }
    .dl-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="logo-badge">⚡ v2.0 &nbsp;·&nbsp; Local Server</div>
    <h1>ULTRA<br>DOWNLOADER</h1>
    <p class="tagline">Video &amp; Audio · Any Platform · Zero Limits</p>
  </header>

  <!-- MAIN CARD -->
  <main class="main-card">
    <div class="glass">

      <!-- URL INPUT -->
      <div class="input-section">
        <label class="input-label" for="urlInput">⌁ Paste URL</label>
        <div class="url-row">
          <input id="urlInput" class="url-input" type="url"
            placeholder="https://youtube.com/watch?v=..."/>
          <button class="btn btn-primary" id="fetchBtn" onclick="fetchInfo()">
            <span id="fetchBtnText">Fetch</span>
          </button>
        </div>
      </div>

      <!-- ERROR BAR -->
      <div class="error-bar" id="errorBar">
        <span>⚠</span>
        <span id="errorMsg">Something went wrong.</span>
      </div>

      <!-- INFO SECTION -->
      <div class="divider" id="divider1" style="display:none"></div>
      <div class="info-section" id="infoSection">

        <!-- Media card -->
        <div class="media-card">
          <div class="thumb-wrap" id="thumbWrap">
            <div class="thumb-placeholder" id="thumbPlaceholder">▶</div>
          </div>
          <div class="media-meta">
            <div class="media-title" id="mediaTitle">—</div>
            <div class="meta-row">
              <div class="meta-pill">By <span id="metaUploader">—</span></div>
              <div class="meta-pill">⏱ <span id="metaDuration">—</span></div>
              <div class="meta-pill" id="metaPlatform">—</div>
            </div>
          </div>
        </div>

        <!-- Mode toggle -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeVideo" onclick="setMode('video')">
            🎬 Video (MP4)
          </button>
          <button class="mode-btn" id="modeAudio" onclick="setMode('audio')">
            🎵 Audio (MP3)
          </button>
        </div>

        <!-- Format picker (video only) -->
        <div id="formatSection">
          <div class="format-label">Select Quality</div>
          <div id="formatGrid"></div>
        </div>

        <!-- Download button -->
        <div class="dl-row">
          <button class="btn btn-accent2" id="dlBtn" onclick="startDownload()">
            ⬇ Download
          </button>
        </div>
      </div>

      <!-- PROGRESS -->
      <div class="divider" id="divider2" style="display:none"></div>
      <div class="progress-section" id="progressSection">
        <div class="progress-header">
          <div class="progress-label"><span class="status-dot"></span>Downloading…</div>
          <div class="progress-pct" id="progressPct">0%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
        </div>
        <div class="progress-file" id="progressFile">Preparing…</div>
      </div>

      <!-- DONE -->
      <div class="done-section" id="doneSection">
        <div class="done-icon">✦</div>
        <div class="done-title">Download Ready</div>
        <div class="done-meta" id="doneMeta">File is ready to save.</div>
        <div class="done-row">
          <button class="btn btn-primary" id="saveBtn" onclick="saveFile()">
            ⬇ Save File
          </button>
          <button class="btn btn-ghost" onclick="reset()">
            ↺ New Download
          </button>
        </div>
      </div>

    </div><!-- .glass -->
  </main>

  <footer>
    Powered by <span>yt-dlp</span> · Running on <span>localhost:3000</span>
  </footer>

</div><!-- .page -->

<script>
// ── State ──────────────────────────────────────────────────────────────────
let state = {
  mode: 'video',      // 'video' | 'audio'
  formats: [],
  selectedFormat: null,
  jobId: null,
  ext: null,
  fileTitle: null,
  fileMb: null,
};

const BASE = 'https://salt-twelve-spouse.ngrok-free.dev';  // same origin; change to 'http://IP:3000' for remote

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtDuration(s) {
  if (!s) return '—';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
           : `${m}:${String(sec).padStart(2,'0')}`;
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  document.getElementById('errorMsg').textContent = msg;
  bar.classList.add('visible');
}
function hideError() {
  document.getElementById('errorBar').classList.remove('visible');
}

function setFetchLoading(on) {
  const btn = document.getElementById('fetchBtn');
  document.getElementById('fetchBtnText').innerHTML =
    on ? '<span class="spinner"></span>' : 'Fetch';
  btn.disabled = on;
  document.getElementById('urlInput').disabled = on;
}

function show(id) {
  const el = document.getElementById(id);
  el.style.display = '';
  el.classList.add('visible');
}
function hide(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
  el.classList.remove('visible');
}

// ── Fetch Info ─────────────────────────────────────────────────────────────
async function fetchInfo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showError('Please paste a URL first.'); return; }

  hideError();
  setFetchLoading(true);
  hide('infoSection'); hide('progressSection'); hide('doneSection');
  document.getElementById('divider1').style.display = 'none';
  document.getElementById('divider2').style.display = 'none';

  try {
    const res = await fetch(`${BASE}/info?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Failed to fetch info.'); return; }
    renderInfo(data);
  } catch(e) {
    showError('Cannot reach server. Is it running?');
  } finally {
    setFetchLoading(false);
  }
}

function renderInfo(data) {
  // Thumbnail
  const tw = document.getElementById('thumbWrap');
  const tp = document.getElementById('thumbPlaceholder');
  if (data.thumbnail) {
    const img = document.createElement('img');
    img.src = data.thumbnail;
    img.alt = 'thumbnail';
    tp.style.display = 'none';
    tw.insertBefore(img, tp);
  }
  document.getElementById('mediaTitle').textContent = data.title;
  document.getElementById('metaUploader').textContent = data.uploader;
  document.getElementById('metaDuration').textContent = fmtDuration(data.duration);
  document.getElementById('metaPlatform').textContent = data.platform;

  state.formats = data.formats || [];
  state.selectedFormat = null;
  buildFormatGrid();

  document.getElementById('divider1').style.display = '';
  show('infoSection');
}

// ── Mode Toggle ────────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  document.getElementById('modeVideo').classList.toggle('active', m === 'video');
  document.getElementById('modeAudio').classList.toggle('active', m === 'audio');
  document.getElementById('formatSection').style.display = m === 'video' ? '' : 'none';
}

// ── Format Grid ────────────────────────────────────────────────────────────
function buildFormatGrid() {
  const grid = document.getElementById('formatGrid');
  grid.innerHTML = '';

  // Best auto option first
  const auto = document.createElement('div');
  auto.className = 'format-chip selected';
  auto.dataset.id = '';
  auto.innerHTML = 'Best Auto<span class="chip-ext">mp4</span>';
  auto.onclick = () => selectFormat(auto, '');
  grid.appendChild(auto);
  state.selectedFormat = '';

  const video = state.formats.filter(f => f.hasVideo);
  video.sort((a, b) => b.height - a.height);

  video.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'format-chip';
    chip.dataset.id = f.id;
    const q = f.label || (f.height ? `${f.height}p` : '?');
    chip.innerHTML = `${q}<span class="chip-ext">${f.ext}</span>`;
    chip.onclick = () => selectFormat(chip, f.id);
    grid.appendChild(chip);
  });
}

function selectFormat(el, id) {
  document.querySelectorAll('.format-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  state.selectedFormat = id;
}

// ── Download ───────────────────────────────────────────────────────────────
async function startDownload() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  hideError();
  hide('doneSection');
  document.getElementById('divider2').style.display = '';
  show('progressSection');
  updateProgress(0, 'Starting…');

  const dlBtn = document.getElementById('dlBtn');
  dlBtn.disabled = true;

  const body = {
    url,
    audio: state.mode === 'audio',
    quality: state.mode === 'video' && state.selectedFormat ? state.selectedFormat : undefined,
  };

  try {
    const res = await fetch(`${BASE}/download`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Download failed.'); dlBtn.disabled = false; return; }

    state.jobId = data.id;
    state.ext   = state.mode === 'audio' ? 'mp3' : 'mp4';
    listenProgress(data.id);
  } catch(e) {
    showError('Cannot reach server.'); dlBtn.disabled = false;
  }
}

function updateProgress(pct, label) {
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('barFill').style.width = `${pct}%`;
  document.getElementById('progressFile').textContent = label || '';
}

// ── SSE Progress Listener ──────────────────────────────────────────────────
function listenProgress(id) {
  const es = new EventSource(`${BASE}/progress/${id}`);
  let pollTimer;

  es.addEventListener('progress', e => {
    const d = JSON.parse(e.data);
    updateProgress(d.progress, `Downloading… ${d.progress}%`);
  });

  es.addEventListener('done', e => {
    const d = JSON.parse(e.data);
    es.close(); clearInterval(pollTimer);
    onDone(d.id, d.mb);
  });

  es.addEventListener('dl_error', e => {
    const d = JSON.parse(e.data);
    es.close(); clearInterval(pollTimer);
    showError(d.error);
    hide('progressSection');
    document.getElementById('divider2').style.display = 'none';
    document.getElementById('dlBtn').disabled = false;
  });

  es.onerror = () => {
    es.close();
    // Fallback: poll
    pollTimer = setInterval(() => pollFallback(id, pollTimer), 1500);
  };
}

async function pollFallback(id, timer) {
  try {
    const res = await fetch(`${BASE}/poll/${id}`);
    const d = await res.json();
    if (d.error) {
      clearInterval(timer);
      showError(d.error);
      hide('progressSection');
      document.getElementById('dlBtn').disabled = false;
    } else if (d.done) {
      clearInterval(timer);
      onDone(id, d.mb);
    } else {
      updateProgress(d.progress || 0, `Downloading… ${d.progress || 0}%`);
    }
  } catch {}
}

function onDone(id, mb) {
  state.jobId = id;
  state.fileMb = mb;
  updateProgress(100, 'Complete!');
  setTimeout(() => {
    hide('progressSection');
    document.getElementById('divider2').style.display = 'none';
    document.getElementById('doneMeta').textContent =
      mb ? `${mb} MB · Ready to save` : 'Ready to save';
    show('doneSection');
    document.getElementById('dlBtn').disabled = false;
  }, 700);
}

// ── Save File ──────────────────────────────────────────────────────────────
function saveFile() {
  if (!state.jobId) return;
  const a = document.createElement('a');
  a.href = `${BASE}/file/${state.jobId}`;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ── Reset ──────────────────────────────────────────────────────────────────
function reset() {
  state = { mode: 'video', formats: [], selectedFormat: null,
            jobId: null, ext: null, fileTitle: null, fileMb: null };
  document.getElementById('urlInput').value = '';
  hide('infoSection'); hide('progressSection'); hide('doneSection');
  document.getElementById('divider1').style.display = 'none';
  document.getElementById('divider2').style.display = 'none';
  hideError();
  // Reset thumbnail
  const tw = document.getElementById('thumbWrap');
  const img = tw.querySelector('img');
  if (img) img.remove();
  document.getElementById('thumbPlaceholder').style.display = '';
  setMode('video');
}

// ── Enter key on URL input ─────────────────────────────────────────────────
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchInfo();
});
</script>
